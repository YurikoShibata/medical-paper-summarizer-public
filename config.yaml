search:
  days_back: 7
  max_results: 200
  top_n: 10
  detailed_top_n: 10
study_type_scores:
  Randomized Controlled Trial: 10
  Meta-Analysis: 9
  Systematic Review: 9
  Clinical Trial: 8
  Multicenter Study: 7
  Observational Study: 6
  Cohort Study: 6
  Practice Guideline: 10
  Guideline: 10
  Review: 4
  Case Reports: 1
  Editorial: 2
  Comment: 1
  Letter: 1
exclude_types:
- Case Reports
- Editorial
- Comment
- Letter
- Published Erratum
clinical_relevance:
  high_value:
  - esrd progression
  - dialysis initiation
  - kidney transplant failure
  - cardiovascular events
  - all-cause mortality
  - hospitalization for kidney disease
  - aki recovery
  - proteinuria reduction
  - blood pressure control
  - renal function decline
  practical:
  - clinical practice guidelines
  - treatment algorithms
  - shared decision-making
  - patient-reported outcomes
  - real-world evidence
  - personalized medicine
  - diagnostic accuracy
  - risk stratification
  japan_relevant:
  - japanese
  - asian
  - japan
  - east asian
basic_science_exclude:
- in vitro
- mouse model
- rat model
- cell line
- ex vivo
- murine
- knockout mice
- animal model
- zebrafish
ai:
  model_chain:
  - gemini-2.5-flash
  - gemini-2.5-flash-lite-preview-09-2025
  - gemini-2.0-flash
  timeout: 120
  max_retries: 3
  retry_delay: 5
output:
  directory: output
  filename_format: 医学論文レビュー_{date}.docx
history:
  file: history.json
  retention_days: 180
specialty_name: 腎臓内科
